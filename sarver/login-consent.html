<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서비스 이용 동의</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      max-width: 560px;
      margin: 48px auto;
      padding: 0 16px 32px;
      color: #222;
      line-height: 1.6;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      color: #03c75a;
    }
    .subtitle {
      margin: 0 0 24px;
      color: #666;
      font-size: 15px;
    }
    .terms {
      background: #f7f7f7;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 16px 18px;
      font-size: 14px;
      white-space: pre-wrap;
    }
    .agree-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0 24px;
      font-size: 16px;
    }
    .agree-row input {
      width: 18px;
      height: 18px;
    }
    button {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      background: #03c75a;
      color: #fff;
    }
    button:disabled {
      background: #b7e8c8;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <h1>서비스 이용 동의</h1>
  <p class="subtitle">네이버 로그인 서비스를 이용하려면 아래 내용에 동의해 주세요.</p>

  <div class="terms">1. 본 서비스는 네이버 OAuth를 통해 로그인합니다.
2. 로그인 시 이메일, 이름 등 네이버에서 제공하는 프로필 정보를 수집·저장할 수 있습니다.
3. 수집된 정보는 서비스 제공 및 계정 식별 목적으로만 사용됩니다.
4. 자세한 내용은 서비스 운영 정책을 따릅니다.</div>

  <label class="agree-row">
    <input id="agree" type="checkbox">
    <span>위 내용에 동의합니다</span>
  </label>

  <button id="accept" type="button" disabled>동의하고 네이버 로그인</button>

  <script>
    const agree = document.getElementById('agree');
    const accept = document.getElementById('accept');

    agree.addEventListener('change', () => {
      accept.disabled = !agree.checked;
    });

    accept.addEventListener('click', () => {
      if (!agree.checked) {
        return;
      }
      window.location.href = '/login/consent/accept';
    });
  </script>
</body>
</html>
