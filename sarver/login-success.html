<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 성공</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 520px;
      margin: 48px auto;
      padding: 0 16px;
    }
    h1 { color: #03c75a; }
    pre {
      background: #f5f5f5;
      padding: 16px;
      overflow: auto;
    }
    a { color: #03c75a; }
  </style>
</head>
<body>
  <h1>네이버 로그인 데이터</h1>
  <p id="message">처리 중...</p>
  <pre id="result"></pre>
  <p><a href="/login">다시 로그인</a></p>
  <script>
    const payload = __PAYLOAD__;
    const message = document.getElementById('message');
    const result = document.getElementById('result');

    if (payload.success) {
      message.textContent = payload.message;
      const user = payload.data && payload.data.user;
      if (user) {
        result.textContent =
          `uid: ${user.uid}\n` +
          `email: ${user.email}\n` +
          `name: ${user.name}\n\n` +
          JSON.stringify(payload, null, 2);
      } else {
        result.textContent = JSON.stringify(payload, null, 2);
      }
    } else {
      message.textContent = payload.message || '로그인 실패';
      message.style.color = 'crimson';
      result.textContent = JSON.stringify(payload, null, 2);
    }

    if (typeof Unity !== 'undefined' && typeof Unity.call === 'function') {
      Unity.call(JSON.stringify(payload));
    }
  </script>
</body>
</html>
