<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyApp 로그인</title>
  <meta http-equiv="refresh" content="0;url=/auth/naver">
  <style>
    body {
      font-family: sans-serif;
      max-width: 420px;
      margin: 48px auto;
      padding: 0 16px;
      text-align: center;
    }
    .naver-btn {
      display: inline-block;
      margin-top: 24px;
      padding: 14px 24px;
      background: #03c75a;
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 4px;
    }
    .naver-btn:hover { background: #02b351; }
    p { color: #555; line-height: 1.6; }
  </style>
</head>
<body>
  <h1>MyApp</h1>
  <p>네이버 로그인 화면으로 이동 중입니다...</p>
  <a class="naver-btn" href="/auth/naver">네이버 로그인</a>
  <p style="font-size: 0.85rem; color: #888; margin-top: 24px;">
    자동 이동이 안 되면 위 버튼을 누르세요.<br>
    주소: <strong>http://127.0.0.1:3000/login</strong>
  </p>
</body>
</html>
